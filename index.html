<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Pixel Battle</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        body { margin: 0; display: flex; flex-direction: column; align-items: center; background: #f0f0f0; font-family: sans-serif; }
        #controls { padding: 10px; background: #fff; width: 100%; display: flex; justify-content: center; gap: 10px; border-bottom: 1px solid #ccc; }
        canvas { background: white; border: 1px solid #000; margin-top: 20px; cursor: crosshair; }
        #timer { font-weight: bold; color: red; }
    </style>
</head>
<body>
    <div id="controls">
        <input type="color" id="colorPicker" value="#ff0000">
        <div id="timer">ГОТОВ</div>
    </div>
    <canvas id="pixelCanvas"></canvas>
    <script src="game.js"></script>
</body>
</html>
