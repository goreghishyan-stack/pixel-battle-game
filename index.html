<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>КГТД — Здесь кайфово</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        :root { 
            --bg: #0d0d12; 
            --card: #16161e; 
            --accent: #7c4dff; /* Фиолетовый неон */
            --text: #e1e1e6;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; user-select: none; -webkit-user-select: none; }
        
        body { 
            margin: 0; background: var(--bg); color: var(--text); 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-image: radial-gradient(circle at 50% -20%, #2a1a4a 0%, #0d0d12 80%);
            overflow: hidden;
        }

        input { user-select: text; -webkit-user-select: text; outline: none; }

        .screen { 
            position: fixed; inset: 0; background: var(--bg); 
            display: flex; align-items: center; justify-content: center; 
            z-index: 1000; transition: 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .hidden { opacity: 0; pointer-events: none; transform: translateY(30px); }

        .auth-box { width: 85%; max-width: 340px; text-align: center; }
        h1 { font-size: 54px; letter-spacing: -3px; margin: 0 0 10px; background: linear-gradient(to bottom, #fff, #7c4dff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .slogan { color: #555; font-size: 14px; margin-bottom: 40px; font-weight: 600; }

        .input-style { 
            width: 100%; padding: 18px; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1); 
            border-radius: 18px; color: #fff; margin-bottom: 12px; font-size: 16px; transition: 0.3s;
        }
        .input-style:focus { border-color: var(--accent); background: rgba(255,255,255,0.07); }

        .btn-main { 
            width: 100%; padding: 18px; border-radius: 18px; border: none; 
            background: var(--accent); color: #fff; font-weight: 900; font-size: 16px; 
            cursor: pointer; box-shadow: 0 10px 20px rgba(124, 77, 255, 0.2);
        }

        .emoji-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin: 20px 0; }
        .emoji-item { font-size: 26px; padding: 12px; background: rgba(255,255,255,0.03); border-radius: 15px; cursor: pointer; border: 2px solid transparent; transition: 0.2s; }
        .emoji-item.selected { border-color: var(--accent); background: rgba(124, 77, 255, 0.1); transform: scale(1.1); }

        header { 
            padding: 20px; display: flex; justify-content: space-between; align-items: center;
            background: rgba(13, 13, 18, 0.7); backdrop-filter: blur(20px); 
            position: sticky; top: 0; z-index: 100; border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        #main-scroll { height: 100vh; overflow-y: auto; padding-bottom: 200px; scroll-behavior: smooth; }
        
        .post { 
            background: var(--card); border-radius: 24px; padding: 20px; 
            margin: 0 15px 15px; border: 1px solid rgba(255,255,255,0.03);
            box-shadow: 0 4px 15px rgba(0,0,0,0.2); animation: fadeIn 0.4s ease forwards;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .post-user { font-size: 13px; font-weight: 800; color: var(--accent); margin-bottom: 8px; }
        .post-text { font-size: 16px; line-height: 1.5; color: #fff; }

        nav { 
            position: fixed; bottom: 0; width: 100%; background: rgba(13, 13, 18, 0.9); 
            display: flex; justify-content: space-around; padding: 25px; 
            border-top: 1px solid rgba(255,255,255,0.05); backdrop-filter: blur(20px);
        }
        nav div { font-size: 26px; opacity: 0.3; cursor: pointer; transition: 0.3s; }
        nav div.active { opacity: 1; transform: translateY(-5px); }

        #input-wrap { position: fixed; bottom: 95px; width: 100%; padding: 0 20px; display: flex; justify-content: center; }
    </style>
</head>
<body>

<div id="screen-auth" class="screen">
    <div class="auth-box">
        <h1>КГТД</h1>
        <p class="slogan">Здесь кайфово</p>
        
        <div id="auth-choice">
            <button class="btn-main" style="margin-bottom:12px" onclick="setMode('reg')">СОЗДАТЬ АККАУНТ</button>
            <button class="btn-main" style="background:transparent; color:#fff; border:1px solid #333; box-shadow:none" onclick="setMode('login')">ВОЙТИ</button>
        </div>

        <div id="auth-form" class="hidden">
            <input type="text" id="nick-input" placeholder="Никнейм" class="input-style">
            <input type="password" id="pass-input" placeholder="Пароль" class="input-style">
            <div id="reg-extras">
                <div class="emoji-grid" id="emoji-grid"></div>
            </div>
            <button id="submit-btn" class="btn-main" onclick="sendAuth()">ПОДТВЕРДИТЬ</button>
            <p onclick="location.reload()" style="margin-top:20px; font-size:13px; color:#555; cursor:pointer">← Назад</p>
        </div>
    </div>
</div>

<header>
    <div>
        <b id="page-title">Лента</b>
        <div id="user-display" style="font-size:10px; color:#555; font-weight:bold; text-transform:uppercase; letter-spacing:1px"></div>
    </div>
    <div onclick="logout()" style="font-size:22px; cursor:pointer; opacity:0.5">🚪</div>
</header>

<div id="main-scroll">
    <div id="page-feed" class="page"><div id="posts-container" style="margin-top:20px"></div></div>
    <div id="page-search" class="page hidden" style="padding:20px">
        <h2 style="margin-bottom:20px">Поиск</h2>
        <input type="text" id="search-in" class="input-style" placeholder="Найти друга...">
        <div id="search-results"></div>
    </div>
</div>

<div id="input-wrap">
    <input type="text" id="post-input" class="input-style" style="border-radius:40px; background: rgba(255,255,255,0.05); border-color: rgba(255,255,255,0.1);" placeholder="Что на уме?">
</div>

<nav>
    <div class="active" onclick="tab('feed', this)">🏠</div>
    <div onclick="tab('search', this)">🔍</div>
</nav>

<script src="script.js"></script>
</body>
</html>
