<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KGTD</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        :root { --bg: #000; --card: #111; --accent: #fff; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; user-select: none; -webkit-user-select: none; }
        body { margin: 0; background: var(--bg); color: #fff; font-family: system-ui, -apple-system, sans-serif; overflow: hidden; }
        input { user-select: text; -webkit-user-select: text; outline: none; }

        .screen { position: fixed; inset: 0; background: #000; z-index: 1000; display: flex; align-items: center; justify-content: center; transition: 0.4s; }
        .hidden { opacity: 0; pointer-events: none; transform: translateY(20px); }

        .auth-box { width: 85%; max-width: 320px; text-align: center; }
        .input-style { width: 100%; padding: 16px; background: #151515; border: 1px solid #222; border-radius: 14px; color: #fff; margin-bottom: 12px; font-size: 16px; }
        
        .btn-main { width: 100%; padding: 16px; border-radius: 14px; border: none; font-weight: 900; cursor: pointer; transition: 0.2s; }
        .btn-main:active { transform: scale(0.95); }

        .emoji-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin: 15px 0; }
        .emoji-item { font-size: 24px; padding: 10px; background: #151515; border-radius: 10px; cursor: pointer; border: 2px solid transparent; }
        .emoji-item.selected { border-color: #fff; background: #222; }

        header { padding: 15px 20px; border-bottom: 1px solid #1a1a1a; display: flex; justify-content: space-between; background: rgba(0,0,0,0.8); backdrop-filter: blur(10px); position: sticky; top: 0; z-index: 100; }
        #main-scroll { height: 100vh; overflow-y: auto; padding-bottom: 180px; }
        
        .post { background: var(--card); border-radius: 20px; padding: 18px; margin: 0 15px 15px; border: 1px solid #1a1a1a; }
        .post-user { font-size: 12px; font-weight: 800; color: #666; margin-bottom: 5px; }

        nav { position: fixed; bottom: 0; width: 100%; background: #000; display: flex; justify-content: space-around; padding: 20px; border-top: 1px solid #1a1a1a; }
        nav div { font-size: 24px; opacity: 0.4; cursor: pointer; }
        nav div.active { opacity: 1; }

        #input-wrap { position: fixed; bottom: 85px; width: 100%; padding: 0 20px; display: flex; justify-content: center; }
    </style>
</head>
<body>

<div id="screen-auth" class="screen">
    <div class="auth-box">
        <h1 style="font-size:50px; letter-spacing:-3px">KGTD</h1>
        
        <div id="auth-choice">
            <button class="btn-main" style="background:#fff; color:#000; margin-bottom:10px" onclick="setMode('reg')">СОЗДАТЬ АККАУНТ</button>
            <button class="btn-main" style="background:transparent; color:#fff; border:1px solid #333" onclick="setMode('login')">ВОЙТИ</button>
        </div>

        <div id="auth-form" class="hidden">
            <input type="text" id="nick-input" placeholder="Никнейм" class="input-style">
            <input type="password" id="pass-input" placeholder="Пароль" class="input-style">
            <div id="reg-extras">
                <div class="emoji-grid" id="emoji-grid"></div>
            </div>
            <button id="submit-btn" class="btn-main" style="background:#fff; color:#000" onclick="sendAuth()">ПОДТВЕРДИТЬ</button>
            <p onclick="location.reload()" style="margin-top:15px; font-size:12px; opacity:0.5; cursor:pointer">Назад</p>
        </div>
    </div>
</div>

<header>
    <b id="page-title">Лента</b>
    <span id="user-display" style="font-size:11px; opacity:0.5"></span>
</header>

<div id="main-scroll">
    <div id="page-feed" class="page"><div id="posts-container" style="margin-top:20px"></div></div>
    <div id="page-search" class="page hidden" style="padding:20px">
        <input type="text" id="search-in" class="input-style" placeholder="Поиск по нику...">
        <div id="search-results"></div>
    </div>
</div>

<div id="input-wrap">
    <input type="text" id="post-input" class="input-style" style="border-radius:30px; background:#1a1a1a" placeholder="Твое сообщение...">
</div>

<nav>
    <div class="active" onclick="tab('feed', this)">🏠</div>
    <div onclick="tab('search', this)">🔍</div>
</nav>

<script src="script.js"></script>
</body>
</html>
