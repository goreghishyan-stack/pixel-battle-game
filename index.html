<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pixel Battle Final</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        * { box-sizing: border-box; }
        body { margin: 0; padding: 0; background: #1a1a1a; color: white; font-family: sans-serif; overflow: hidden; }
        
        #controls { 
            height: 60px; background: #2c3e50; display: flex; align-items: center; 
            padding: 0 20px; gap: 20px; border-bottom: 2px solid #34495e; position: relative; z-index: 10; 
        }
        
        canvas { display: block; cursor: crosshair; touch-action: none; }

        #login-screen { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.95); display: flex; align-items: center; justify-content: center; z-index: 100; 
        }
        #login-box { background: #34495e; padding: 30px; border-radius: 12px; text-align: center; width: 90%; max-width: 400px; }
        
        input[type="text"] { padding: 12px; width: 100%; border-radius: 6px; border: none; margin-bottom: 15px; font-size: 16px; }
        button { padding: 12px 30px; background: #27ae60; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 16px; font-weight: bold; }
        
        #pixel-info { 
            position: fixed; background: rgba(0,0,0,0.85); color: white; padding: 6px 12px; 
            border-radius: 4px; font-size: 13px; pointer-events: none; display: none; z-index: 1000; border: 1px solid #555;
        }
        #timer-display { font-weight: bold; color: #f1c40f; min-width: 100px; }
    </style>
</head>
<body>

<div id="pixel-info"></div>

<div id="login-screen">
    <div id="login-box">
        <h2 style="margin-top:0">PIXEL BATTLE</h2>
        <input type="text" id="nickname" placeholder="Твой ник..." maxlength="15">
        <button onclick="startGame()">В БОЙ</button>
    </div>
</div>

<div id="controls">
    <input type="color" id="colorPicker" value="#e74c3c">
    <div id="timer-display">ГОТОВ</div>
    <div id="status" style="font-size: 12px; color: #bdc3c7;"></div>
</div>

<canvas id="pixelCanvas"></canvas>

<script src="game.js"></script>
</body>
</html>
