<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Tactical Map</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        body { margin: 0; background: #1a1a1a; display: flex; flex-direction: column; align-items: center; color: white; font-family: sans-serif; overflow: hidden; }
        #controls { padding: 15px; background: #333; width: 100%; text-align: center; border-bottom: 2px solid #444; }
        canvas { background-color: #222; cursor: crosshair; box-shadow: 0 0 20px black; }
        input { cursor: pointer; }
    </style>
</head>
<body>
    <div id="controls">
        Цвет: <input type="color" id="colorPicker" value="#00ff00">
        <span style="margin-left:20px;">Зажми мышку и рисуй! (Линии исчезнут через 5 сек)</span>
    </div>
    <canvas id="pixelCanvas"></canvas>
    <script src="game.js"></script>
</body>
</html>
