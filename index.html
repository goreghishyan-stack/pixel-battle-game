<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ИТД — Соцсеть</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        * { box-sizing: border-box; }
        body { margin: 0; background: #000; color: #fff; font-family: 'Courier New', Courier, monospace; }
        
        /* Хедер в стиле итд */
        header { 
            padding: 20px; border-bottom: 2px solid #fff; 
            display: flex; justify-content: space-between; align-items: center;
            position: sticky; top: 0; background: #000; z-index: 10;
        }
        
        #feed { max-width: 600px; margin: 0 auto; padding: 20px; }
        
        .post { 
            border: 1px solid #333; padding: 15px; margin-bottom: 20px; 
            background: #050505; transition: 0.3s;
        }
        .post:hover { border-color: #fff; }
        .post-header { font-weight: bold; margin-bottom: 10px; color: #0f0; }
        .post-content { line-height: 1.5; word-wrap: break-word; }

        /* Поле ввода */
        #input-area { 
            position: fixed; bottom: 0; left: 0; width: 100%; 
            background: #000; border-top: 2px solid #fff; padding: 20px;
        }
        #post-input { 
            width: 100%; background: #000; border: 1px solid #555; 
            color: #fff; padding: 15px; font-size: 16px; outline: none;
        }
        #post-input:focus { border-color: #fff; }

        /* Вход */
        #login-screen { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: #000; display: flex; align-items: center; justify-content: center; z-index: 100; 
        }
        .box { border: 2px solid #fff; padding: 30px; text-align: center; }
        input[type="text"] { padding: 10px; background: #000; color: #fff; border: 1px solid #fff; margin-bottom: 10px; }
        button { padding: 10px 20px; background: #fff; color: #000; border: none; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<div id="login-screen">
    <div class="box">
        <h1>ИТД</h1>
        <input type="text" id="nickname" placeholder="Твой ник или эмодзи...">
        <br>
        <button onclick="enterITD()">ЗАЙТИ</button>
    </div>
</div>

<header>
    <div id="logo">ИТД.СЕТЬ</div>
    <div id="user-name"></div>
</header>

<div id="feed">
    </div>

<div style="height: 120px;"></div> <div id="input-area">
    <input type="text" id="post-input" placeholder="Что нового? (Enter чтобы запостить)">
</div>

<script src="script.js"></script>
</body>
</html>
